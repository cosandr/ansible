---

# renovate: datasource=github-releases depName=prometheus/node_exporter
node_exporter_version: "1.12.0"
node_exporter_collectors:
  - systemd

node_exporter_no_collectors:
  - mdadm
  - zfs
  - xfs
  - bcache
  - textfile

node_exporter_config_firewall: "{{ firewall_enabled | default(true) }}"
node_exporter_allow_ips: "{{ subnets.vm.prom }}"
node_exporter_port: 9100
