    cidr: 10.0.10.0/24
    vlan: 10
    mt_lists:
      - LAN
      - NOSEC
    dhcp_range: 10.0.10.240-10.0.10.254
    domain: vm.{{ domains['hb'] }}
  general:
    cidr: 10.0.50.0/24
