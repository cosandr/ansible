---

# Debian uses a plain 'default' file
nginx_provisioning_synced_patterns: ["*"]
nginx_provisioning_synced_excludes:
  - "manual-*.conf"
  - "private-*.conf"

nginx_listen_http: |-
  listen {% if nginx_listen_v4 is defined %}{{ nginx_listen_v4 }}:{% endif %}80;
  {% if nginx_listen_v6 is defined %}
  listen [{{ nginx_listen_v6 }}]:80;
  {% endif %}

nginx_listen_https: |-
  listen 127.0.0.1:8443 ssl proxy_protocol;
  set_real_ip_from 127.0.0.1;
  real_ip_header proxy_protocol;

nginx_extra_conf_options: |
  stream {
    log_format main '$remote_addr [$time_local] '
                    '$protocol $status $bytes_sent $bytes_received '
                    '$session_time "$upstream_addr" '
                    '"$upstream_bytes_sent" "$upstream_bytes_received" "$upstream_connect_time"';

    map $ssl_preread_server_name $backend_pool {
  {% if pip_v6_map.k8s is defined %}
      immich.{{ domains['dv'] }} k8s_ingress;
  {% endif %}
      default nginx_local;
    }

    upstream nginx_local {
      server 127.0.0.1:8443;
    }

    upstream k8s_ingress {
      server {{ k8s_ingress_public_address }}:443;
    }

    upstream gitlab-ssh {
  {% for h in groups['gitlab'] %}
      server {{ hostvars[h].ansible_host }}:{{ hostvars[h].gitlab_sshd_port }};
  {% endfor %}
    }

    server {
      listen {% if nginx_listen_v4 is defined %}{{ nginx_listen_v4 }}:{% endif %}443;
      ssl_preread on;
      proxy_pass $backend_pool;
      proxy_protocol on;
    }

  {% if nginx_listen_v6 is defined %}
  server {
    listen [{{ nginx_listen_v6 }}]:443;
    proxy_pass nginx_local;
    proxy_protocol on;
  }
  {% endif %}

  {% if pip_v6_map.k8s is defined %}
  server {
    listen [{{ pip_v6_map.k8s }}]:443;
    proxy_pass k8s_ingress;
    proxy_protocol on;
  }
  {% endif %}

    server {
      listen {% if nginx_listen_v4 is defined %}{{ nginx_listen_v4 }}:{% endif %}22;
  {% if nginx_listen_v6 is defined %}
      listen [{{ nginx_listen_v6 }}]:22;
  {% endif %}
      proxy_pass gitlab-ssh;
      proxy_protocol on;

      access_log {{ nginx_sites_logs }}/stream-gitlab-ssh.log {{ nginx_access_log_options }};
    }
  }
