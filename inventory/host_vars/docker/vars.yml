---

domain: "{{ domains['hb'] }}"

__unattended_package_blacklist_3:
  - ".*cuda.*"
  - ".*nvidia.*"
  - "container.*"
  - "docker.*"

docker_registries:
  - url: "{{ gitlab_registry_external_url | regex_replace('^https?://', '') }}"
    username: "{{ vault_gitlab_token_name }}"
    password: "{{ vault_gitlab_token_value }}"

swapfile_size: 4G

# renovate: datasource=github-releases depName=google/cadvisor
cadvisor_version: "0.56.2"
cadvisor_port: 9101
cadvisor_listen_ip: "{{ ansible_host }}"
prometheus_cadvisor_targets: ["{{ ansible_host }}:{{ cadvisor_port }}"]

# renovate: datasource=github-releases depName=cosandr/nvidia-exporter
nvidia_exporter_version: "1.2.0"
nvidia_exporter_port: 9401
nvidia_exporter_listen_address: "{{ ansible_host }}:{{ nvidia_exporter_port }}"
nvidia_exporter_args:
  - "-nvidia.per-process"
  - "-nvidia.strip-process-args"
  - "-nvidia.strip-process-path"
