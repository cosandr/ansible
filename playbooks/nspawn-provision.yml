#!/usr/bin/env -S ansible-playbook
---

- name: Run common tasks
  hosts: nspawn
  gather_facts: true
  pre_tasks:
    - name: Include common tasks
      ansible.builtin.include_tasks:
        file: ../tasks/common_servers.yml
      tags: ["always"]

    - name: Disable chrony-wait
      ansible.builtin.systemd:
        name: "chrony-wait.service"
        state: stopped
        enabled: false
      tags: ["chrony"]

- name: Setup Loki
  hosts: loki
  roles:
    - role: loki
      tags: ["loki"]

- name: Import Prometheus playbook
  ansible.builtin.import_playbook: prom.yml

- name: Setup Nextcloud
  hosts: nextcloud
  gather_facts: true
  roles:
    - role: cosandr.nextcloud
      tags: ["nextcloud"]

    - role: nextcloud_exporter
      tags: ["nextcloud-exporter"]
