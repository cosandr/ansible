---
- name: Install spotify on Arch Linux
  when: ansible_distribution == 'Archlinux'
  block:
    - name: Import GPG key # noqa: no-changed-when
      become: true
      become_user: "{{ aur_build_user }}"
      ansible.builtin.shell: "set -o pipefail && curl -sS https://download.spotify.com/debian/pubkey_0D811D58.gpg | gpg --import -"
      args:
        executable: /bin/bash

    - name: Install spotify from AUR
      become: true
      become_user: "{{ aur_build_user }}"
      aur:
        name: spotify
        state: present

- name: Install spotify on Debian
  when: ansible_os_family == 'Debian'
  block:
    - name: Install key
      become: true
      ansible.builtin.apt_key:
        url: "https://download.spotify.com/debian/pubkey_0D811D58.gpg"
        state: present

    - name: Install repository
      become: true
      ansible.builtin.apt_repository:
        repo: "deb http://repository.spotify.com stable non-free"
        filename: spotify
        state: present

    - name: Install spotify
      become: true
      ansible.builtin.apt:
        name: spotify-client
        update_cache: true
        state: present
